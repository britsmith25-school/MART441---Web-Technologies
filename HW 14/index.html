<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Phaser Game - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>

<script>

var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 300 },
            debug: false
        }
    },
    scene: {
        preload,
        create,
        update
    }
};

var player, stars, bombs, platforms, spikes;
var cursors, keys, spaceKey;

var score = 0;
var lives = 3;

var scoreText;
var livesText;

var gameOver = false;

new Phaser.Game(config);

function preload ()
{
    this.load.image('sky', 'assets/sky.png');
    this.load.image('ground', 'assets/platform.png');
    this.load.image('star', 'assets/star.png');
    this.load.image('bomb', 'assets/bomb.png');

    this.load.spritesheet('dude', 'assets/dude.png',
        { frameWidth: 32, frameHeight: 48 });
}

function create ()
{
    this.add.image(400, 300, 'sky');

    platforms = this.physics.add.staticGroup();

    platforms.create(400, 568, 'ground').setScale(2).refreshBody();
    platforms.create(600, 400, 'ground');
    platforms.create(50, 250, 'ground');
    platforms.create(750, 220, 'ground');

    player = this.physics.add.sprite(100, 450, 'dude');

    player.setBounce(0.2);
    player.setCollideWorldBounds(true);

    // animations
    this.anims.create({
        key: 'left',
        frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });

    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dude', frame: 4 } ],
        frameRate: 20
    });

    this.anims.create({
        key: 'right',
        frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    // controls
    cursors = this.input.keyboard.createCursorKeys();

    keys = this.input.keyboard.addKeys({
        up: Phaser.Input.Keyboard.KeyCodes.W,
        left: Phaser.Input.Keyboard.KeyCodes.A,
        down: Phaser.Input.Keyboard.KeyCodes.S,
        right: Phaser.Input.Keyboard.KeyCodes.D
    });

    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    // stars
    stars = this.physics.add.group({
        key: 'star',
        repeat: 11,
        setXY: { x: 12, y: 0, stepX: 70 }
    });

    stars.children.iterate(function (child) {
        child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
        child.body.gravity.y = Phaser.Math.Between(100, 600);
    });

    // bombs
    bombs = this.physics.add.group();

    // spikes
    spikes = this.physics.add.group();

    // ground spikes
    spikes.create(200, 550, 'bomb');
    spikes.create(400, 550, 'bomb');
    spikes.create(600, 550, 'bomb');

    // platform spikes
    spikes.create(600, 370, 'bomb');
    spikes.create(50, 220, 'bomb');
    spikes.create(750, 190, 'bomb');

    spikes.children.iterate(function (spike) {
        spike.setImmovable(true);
        spike.body.allowGravity = false;
    });

    // UI
    scoreText = this.add.text(16, 16, 'Score: 0',
        { fontSize: '32px', fill: '#000' });

    livesText = this.add.text(16, 50, 'Lives: 3',
        { fontSize: '24px', fill: '#000' });

    // collisions
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(bombs, platforms);

    this.physics.add.collider(player, spikes, hitHazard, null, this);
    this.physics.add.collider(player, bombs, hitHazard, null, this);

    this.physics.add.overlap(player, stars, collectStar, null, this);
}

function update ()
{
    if (gameOver) return;

    // movement
    if (cursors.left.isDown || keys.left.isDown)
    {
        player.setVelocityX(-160);
        player.anims.play('left', true);
    }
    else if (cursors.right.isDown || keys.right.isDown)
    {
        player.setVelocityX(160);
        player.anims.play('right', true);
    }
    else
    {
        player.setVelocityX(0);
        player.anims.play('turn');
    }

    // jump
    if ((spaceKey.isDown || cursors.up.isDown || keys.up.isDown)
        && player.body.touching.down)
    {
        player.setVelocityY(-330);
    }

    // fall off map
    if (player.y > 600)
    {
        loseLife(this);
    }
}

function collectStar (player, star)
{
    star.disableBody(true, true);

    score += 10;
    scoreText.setText('Score: ' + score);

    if (stars.countActive(true) === 0)
    {
        stars.children.iterate(function (child) {
            child.enableBody(true, child.x, 0, true, true);
            child.body.gravity.y = Phaser.Math.Between(100, 600);
        });

        var x = (player.x < 400)
            ? Phaser.Math.Between(400, 800)
            : Phaser.Math.Between(0, 400);

        var bomb = bombs.create(x, 16, 'bomb');
        bomb.setBounce(1);
        bomb.setCollideWorldBounds(true);
        bomb.setVelocity(Phaser.Math.Between(-200, 200), 20);
        bomb.allowGravity = false;
    }
}

function hitHazard(player, hazard)
{
    loseLife(this);
}

function loseLife(scene)
{
    lives--;
    livesText.setText('Lives: ' + lives);

    if (lives <= 0)
    {
        gameOver = true;

        player.setTint(0xff0000);
        player.anims.play('turn');

        scoreText.setText('GAME OVER');

        showGameOverOptions(scene);
        return;
    }

    resetPlayer();
}

function resetPlayer()
{
    player.setPosition(100, 450);
    player.clearTint();
    player.setVelocity(0, 0);
}

function showGameOverOptions(scene)
{
    var restartText = scene.add.text(300, 250, 'Play Again',
        { fontSize: '32px', fill: '#0f0' })
        .setInteractive();

    var quitText = scene.add.text(300, 300, 'Accept Defeat',
        { fontSize: '32px', fill: '#f00' })
        .setInteractive();

    restartText.on('pointerdown', function ()
    {
        scene.scene.restart();
    });

    quitText.on('pointerdown', function ()
    {
        restartText.destroy();
        quitText.destroy();

        scene.add.text(400, 300,
            'Thanks for playing!\nRefresh to try again.',
            { fontSize: '28px', fill: '#000', align: 'center' }
        ).setOrigin(0.5);
    });
}

</script>

</body>
</html>
